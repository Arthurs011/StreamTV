<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamTV - Modern IPTV Player</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
</head>
<body>
    <!-- Header with Search -->
    <header class="header">
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z"/>
            </svg>
            <span>StreamTV</span>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search channels..." autocomplete="off">
        </div>
        <button id="favoritesToggle" class="icon-btn" title="Favorites">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </button>
    </header>

    <div class="main-container">
        <!-- Sidebar Categories -->
        <aside class="sidebar" id="sidebar">
            <div class="category-list" id="categoryList">
                <!-- Categories will be injected here -->
            </div>
        </aside>

        <!-- Channel Grid -->
        <main class="content">
            <div class="channel-stats" id="channelStats">
                Shows <span id="visibleCount">0</span> of <span id="totalCount">0</span> channels
            </div>
            <div class="channel-grid" id="channelGrid">
                <!-- Channel cards will be injected here -->
            </div>
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
                <p>Loading channels...</p>
            </div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
                </svg>
                <p>No channels found</p>
            </div>
        </main>
    </div>

    <!-- Video Player Overlay -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-container">
            <div class="player-header">
                <div class="player-channel-info">
                    <img id="playerChannelLogo" src="" alt="" class="player-logo">
                    <span id="playerChannelName"></span>
                </div>
                <button class="close-btn" id="closePlayer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="player-wrapper">
                <video id="videoPlayer" controls autoplay></video>
                <div class="player-loading" id="playerLoading">
                    <div class="spinner"></div>
                    <p>Loading stream...</p>
                </div>
                <div class="player-error" id="playerError" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                    <p>Stream not available</p>
                    <button class="retry-btn" id="retryStream">Retry</button>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="prevChannel" title="Previous Channel">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                <button class="control-btn" id="playPause" title="Play/Pause">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
                <button class="control-btn" id="nextChannel" title="Next Channel">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
                <button class="control-btn" id="fullscreen" title="Fullscreen">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
